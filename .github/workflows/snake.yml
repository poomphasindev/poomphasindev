name: Generate Snake Animation

on:
  # รันอัตโนมัติทุกๆ 12 ชั่วโมง
  schedule:
    - cron: "0 */12 * * *"
  # อนุญาตให้กดรันเองได้แบบ Manual
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          # ดึงข้อมูลจาก Username ของคุณ
          github_user_name: poomphasindev
          # สร้างไฟล์ภาพงูทั้งแบบ Light และ Dark Mode
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push ไฟล์ภาพงูที่สร้างเสร็จแล้วไปเก็บไว้ที่ Branch ชื่อ 'output'
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
